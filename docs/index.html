<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Index of /</title>
</head>
<body>
<h1>Index of /</h1><hr>
<hr>

<div id="latest-plugin">
  <h3>Latest Plugin Version</h3>
  <pre id="plugin-link"></pre>
</div>

<hr>
</body>
</html>

<script>
async function loadLatestPlugin() {
  try {
    const response = await fetch('https://api.github.com/repos/TheIntroDB/kodi-addon/releases');
    if (!response.ok) throw new Error('Failed to fetch releases');
    
    const releases = await response.json();
    
    if (releases.length === 0) {
      document.getElementById('plugin-link').innerHTML = 'No releases found';
      return;
    }
    
    // Sort releases by version (newest first)
    releases.sort((a, b) => b.tag_name.localeCompare(a.tag_name));
    
    const latestRelease = releases[0];
    const pluginAsset = latestRelease.assets.find(asset => asset.name === 'plugin.video.tidb.zip');
    
    if (pluginAsset) {
      const linkHtml = `<a href="${pluginAsset.browser_download_url}">${pluginAsset.name}</a> (${latestRelease.tag_name})`;
      document.getElementById('plugin-link').innerHTML = linkHtml;
    } else {
      document.getElementById('plugin-link').innerHTML = 'Plugin not found in latest release';
    }
    
  } catch (error) {
    document.getElementById('plugin-link').innerHTML = 'Error loading latest plugin';
  }
}

// Load latest plugin when page loads
document.addEventListener('DOMContentLoaded', loadLatestPlugin);
</script>
