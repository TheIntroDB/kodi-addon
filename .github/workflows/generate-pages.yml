name: Generate Static Pages

on:
  release:
    types: [published, edited, deleted]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/generate-pages.yml'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-pages:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Generate static index with release links
      run: |
        cd docs
        
        # Create a Node.js script to generate the static index
        cat > build-index.js << 'EOF'
        const https = require('https');
        
        const GITHUB_API_URL = 'https://api.github.com/repos/TheIntroDB/kodi-addon/releases';
        
        function fetchReleases() {
          return new Promise((resolve, reject) => {
            const options = {
              headers: {
                'User-Agent': 'GitHub-Actions-Generator',
                'Accept': 'application/vnd.github.v3+json'
              }
            };
            
            https.get(GITHUB_API_URL, options, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                try {
                  resolve(JSON.parse(data));
                } catch (e) {
                  reject(new Error('Failed to parse JSON'));
                }
              });
            }).on('error', reject);
          });
        }
        
        async function buildIndex() {
          try {
            console.log('Fetching releases from GitHub...');
            const releases = await fetchReleases();
            
            if (releases.length === 0) {
              console.log('No releases found');
              return;
            }
            
            // Sort releases by version (newest first)
            releases.sort((a, b) => b.tag_name.localeCompare(a.tag_name));
            
            // Generate plugin links HTML
            let pluginLinksHtml = '';
            
            releases.forEach(release => {
              const pluginAsset = release.assets.find(asset => asset.name === 'plugin.video.tidb.zip');
              if (pluginAsset) {
                pluginLinksHtml += `<a href="${pluginAsset.browser_download_url}">plugin.video.tidb-${release.tag_name}.zip</a>\n`;
              }
            });
            
            // Read the current index.html
            const fs = require('fs');
            let indexContent = fs.readFileSync('index.html', 'utf8');
            
            // Replace the existing <pre> block with the updated plugin link
            indexContent = indexContent.replace(
              /<pre>[\s\S]*?<\/pre>/,
              `<pre>\n${pluginLinksHtml}</pre>`
            );
            
            // Write the updated index.html
            fs.writeFileSync('index.html', indexContent);
            console.log('Updated index.html with plugin links');
            
            console.log('Static page generation complete!');
            
          } catch (error) {
            console.error('Generation failed:', error);
            process.exit(1);
          }
        }
        
        buildIndex();
        EOF
        
        # Run the build script
        node build-index.js
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Check if there are changes
        if [[ -n $(git status --porcelain docs/) ]]; then
          git add docs/
          git commit -m "Update static version pages from releases"
          git push
        else
          echo "No changes to commit"
        fi
        
    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'docs'
        
  deploy:
    needs: generate-pages
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4